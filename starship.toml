# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
palette = "catppuccin_macchiato"

# Inserts a blank line between shell prompts
add_newline = true

# Custom format to move language info and time to the right
format = """
$all\
$fill\
$memory_usage\
$nodejs\
$rust\
$c\
$cmake\
$golang\
$python\
$time\
$line_break\
$character"""

[character]
success_symbol = "[Ôöö \\$](bold #a6e3a1)"
error_symbol = "[Ôöö \\$](#f38ba8)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# [cmd_duration]
# min_time = 500
# format = "underwent [$duration](bold #f9e2af)"

[directory]
truncation_length = 5
format = " [¯ù¥ ](#89b4fa)[$path]($style)[$read_only]($read_only_style) "
style = "blue"

[git_branch]
truncation_length = 4
truncation_symbol = ""
format = "[$symbol$branch]($style) "
symbol = "´Éÿ "
style = "bold  green"

[git_commit]
commit_hash_length = 4
tag_symbol = "´Ç½ "

[git_state]
format = '(\($state( $progress_current of $progress_total)\)) '
cherry_pick = "¯èø PICKING"

[git_status]
conflicted = "Ôÿó´©Å"
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
up_to_date = "¾░©® "
untracked = "¾▒ÇÂ "
stashed = "¯¬ÿ "
modified = "¯¡â "
renamed = "¾▒çº "
deleted = "¾▒ÇÀ "
staged = '¾░ØÆ ($count) '
format = '([¯¼Ç $all_status$ahead_behind]($style) )'
style = "bold yellow"

[c]
symbol = "¯ÿ× "
format = "[$symbol($version )]($style)"

[cmake]
symbol = "¯ÿØ "
format = "[$symbol($version )]($style)"

[golang]
symbol = "¯ÿº "
format = "[$symbol($version )]($style)"

[hostname]
ssh_only = false
format = "[¯¼ƒ](bold #a6e3a1)[$hostname]($style)"
style = "bold green"
disabled = false
trim_at = ".companyname.com"

[nodejs]
symbol = "¯£ÿ "
format = "[$symbol($version )]($style)"
style = "bold green"

[python]
symbol = "¯êÁ "
format = "via [$symbol($version )]($style)"
pyenv_version_name = true

[rust]
symbol = "¾▒ÿù "
format = "via [$symbol($version )]($style)"

[time]
disabled = false
format = '[ÔÅ▓ $time](bold #f9e2af)'
time_format = "%T"
utc_time_offset = "+7"

[username]
format = "[Ôöî ¯Àà ](bold #a6e3a1)[$user]($style)"
disabled = false
show_always = true
style_user = "bold green"

[memory_usage]
disabled = false
threshold = 80
symbol = '´Æ╝ '
style = 'bold red'
format = '[$symbol$ram_pct]($style) '

